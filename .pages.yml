media:
  input: public
  output: /

content:
  - name: inicio
    label: Inicio
    type: file
    path: src/content/inicio.md
    format: yaml-frontmatter
    fields:
      - name: linea1
        label: Línea 1
        type: string

      - name: linea2
        label: Línea 2
        type: string

      - name: fondo
        label: Imagen de fondo
        type: image # Mapea a z.string() [1, 2]
        description: "Imagen principal de la cabecera"

      - name: video
        label: Video de fondo
        type: file # Mapea a z.string() [1, 3]
        description: "Archivo de video (mp4, webm)"

      - name: body
        label: Contenido principal
        type: rich-text # Especial: mapea al contenido debajo del frontmatter [1, 4]
        description: "Cuerpo de texto del archivo Markdown"

  - name: about
    label: Nosotros
    type: file
    path: src/content/about.md
    format: yaml-frontmatter
    fields:
      - name: bullets
        label: Puntos clave (Bullets)
        type: block # Permite elegir entre diferentes formas de objetos (z.union) [5, 6]
        list: true
        blocks:
          - name: texto_simple
            label: Solo Texto
            fields:
              - name: value
                label: Contenido
                type: string
          - name: detallado
            label: Información Detallada
            fields:
              - name: title
                label: Título
                type: string
              - name: text
                label: Descripción
                type: text # Permite varias líneas [1]
              - name: image
                label: Imagen
                type: image

      - name: texto1
        label: Primer bloque de texto
        type: text # Ideal para párrafos largos [1]

      - name: texto2
        label: Segundo bloque de texto
        type: text

  - name: servicios
    label: Servicios
    type: file
    path: src/content/servicios.md
    format: yaml-frontmatter
    fields:
      - name: encabezado
        label: Encabezado de la página
        type: string

      - name: servicios_lista
        label: Lista de servicios
        type: object
        list: # Maneja el z.array(z.object({...})) de Astro [7]
          max: 4
          collapsible:
            summary: "{titulo}" # Mejora visual al contraer ítems [8]
        fields:
          - name: titulo
            label: Título del Servicio
            type: string

          - name: descripcion
            label: Descripción
            type: text