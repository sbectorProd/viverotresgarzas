    fields:
      - name: fondo
        label: Fondo
        type: file

      - name: linea1
        label: Línea 1
        type: string

      - name: linea2
        label: Línea 2
        type: string

      - name: body
        label: Contenido
        type: rich-text

  - name: nosotros
    label: Nosotros
    type: file
    path: src/content/about.md
    format: yaml-frontmatter

    fields:
      - name: bullet1
        label: Bullet 1
        type: string

      - name: bullet2
        label: Bullet 2
        type: string

      - name: bullet3
        label: Bullet 3
        type: string

      - name: bullet4
        label: Bullet 4
        type: string

      - name: body
        label: Contenido
        type: rich-text