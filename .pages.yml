media:
  input: public
  output: /

content:
  - name: inicio
    label: Inicio
    type: file
    path: src/content/inicio.md
    format: yaml-frontmatter
    fields:
      - name: fondo
        label: Imagen de inicio
        type: image # [1, 2] Mejorado para mostrar previsualización de imagen
        description: "Sube o selecciona la imagen principal de la cabecera" # [3] Ayuda al editor

      - name: linea1
        label: Línea 1
        type: string

      - name: linea2
        label: Línea 2
        type: string

      - name: body
        label: Contenido principal
        type: rich-text # [1, 4] Mapea directamente al contenido debajo del frontmatter
        description: "Texto que aparecerá debajo de las líneas principales"

  - name: nosotros
    label: Nosotros
    type: file
    path: src/content/about.md
    format: yaml-frontmatter
    fields:
      - name: bullets
        label: Puntos clave (Bullets)
        type: string
        list:
          max: 4
        description: "Lista de puntos destacados de la sección (Límite 4 bullets)"

      - name: texto1
        label: Primer bloque de texto
        type: text # [1] 'text' permite múltiples líneas, ideal para párrafos

      - name: texto2
        label: Segundo bloque de texto
        type: text

  - name: proyectos
    label: Proyectos
    type: file
    path: src/content/proyectos.md
    format: yaml-frontmatter
    fields:
      - name: encabezado
        label: Encabezado de la página
        type: string

      - name: proyectos_lista
        label: Lista de Proyectos
        type: object
        list: # [5, 6] Crea una lista de objetos repetibles y organizados
          collapsible:
            summary: "{titulo}" # [6] Muestra el nombre del proyecto en la lista colapsada
        fields:
          - name: titulo
            label: Título del Proyecto
            type: string
            required: true # [3] Asegura que el proyecto tenga nombre

          - name: descripcion
            label: Descripción del Proyecto
            type: text