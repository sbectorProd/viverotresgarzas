media:
  input: public
  output: /

content:
  - name: inicio
    label: Inicio
    type: file
    path: src/content/inicio.md
    format: yaml-frontmatter
    fields:
    - name: fondo
      label: Imagen de inicio
      type: image # Mapea a z.string() en Astro (la ruta del archivo) [1, 2]
      description: "Sube o selecciona la imagen principal de la cabecera"

    - name: video
      label: Video de fondo
      type: file # Campo faltante en tu config anterior, necesario para el esquema [1, 3]
      description: "Selecciona un archivo de video (mp4, webm)"

    - name: linea1
      label: Línea 1
      type: string # Mapea a z.string() [1]

    - name: linea2
      label: Línea 2
      type: string

    - name: body
      label: Contenido principal
      type: rich-text # Mapea al contenido markdown debajo del frontmatter [1, 4]
      description: "Texto que aparecerá debajo de las líneas principales"

  - name: nosotros
    label: Nosotros
    type: file
    path: src/content/about.md
    format: yaml-frontmatter
    fields:
      - name: bullets
        label: Puntos clave (Bullets)
        type: string
        list:
          max: 4
        description: "Lista de puntos destacados de la sección (Límite 4 bullets)"

      - name: texto1
        label: Primer bloque de texto
        type: text # [1] 'text' permite múltiples líneas, ideal para párrafos

      - name: texto2
        label: Segundo bloque de texto
        type: text

  - name: proyectos
    label: Proyectos
    type: file
    path: src/content/proyectos.md
    format: yaml-frontmatter
    fields:
      - name: encabezado
        label: Encabezado de la página
        type: string

      - name: proyectos_lista
        label: Lista de Proyectos
        type: object
        list:
          max: 4
          collapsible:
            summary: "{titulo}" # [6] Muestra el nombre del proyecto en la lista colapsada
        fields:
          - name: titulo
            label: Título
            type: string
            required: true # [3] Asegura que el proyecto tenga nombre

          - name: descripcion
            label: Descripción
            type: text