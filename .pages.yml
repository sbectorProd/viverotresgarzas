backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "about"
    label: "About"
    files:
      - file: "src/content/about.md"
        label: "About Page"
        name: "about"
        fields:
          - { label: "Texto 1", name: "texto1", widget: "string" }
          - { label: "Texto 2", name: "texto2", widget: "string" }
          - { label: "Contenido", name: "body", widget: "markdown" }